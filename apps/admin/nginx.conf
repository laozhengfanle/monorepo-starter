# apps/admin/nginx.conf — Admin 管理后台 nginx 配置
#
# 部署位置：容器内 /etc/nginx/conf.d/default.conf
# 监听端口：80
# 反代目标：server:3000（docker network 内通过服务名解析）
#
# 功能：
#   1. 静态资源服务（vite build 产物） + 1 年强缓存
#   2. SPA fallback：所有未匹配路径回退到 /index.html，由 vue-router 接管
#   3. /api/ 反代到 server 服务的 REST 端点
#   4. /graphql 反代到 server 服务的 GraphQL endpoint（含 WebSocket 支持）
#   5. /uploads/ 反代到 server 服务的静态资源（用户头像等）
#   6. 安全头（CSP / X-Frame-Options / X-Content-Type-Options / Referrer-Policy）
#   7. gzip 压缩

# ===== gzip 压缩 =====
# 文本类资源（HTML/CSS/JS/JSON/WASM）走 gzip，> 1KB 才压缩（避免小文件 CPU 浪费）
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/wasm;

# ===== 真实 IP 还原 =====
# 当 nginx 前还有一层反向代理时（云厂商 LB / CDN），通过 X-Forwarded-For 还原客户端真实 IP
# 生产环境必须改为上游代理的具体 IP/网段，不要使用 0.0.0.0/0
real_ip_header X-Forwarded-For;
set_real_ip_from 172.16.0.0/12;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ===== 安全头 =====
    # X-Frame-Options: 防止 clickjacking（iframe 嵌入攻击）
    add_header X-Frame-Options "SAMEORIGIN" always;
    # X-Content-Type-Options: 禁止 MIME sniffing，强制按 Content-Type 处理
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer-Policy: 跨站请求时不带 Referrer，避免泄漏管理后台 URL
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # X-XSS-Protection: 启用浏览器 XSS 过滤器
    add_header X-XSS-Protection "1; mode=block" always;
    # CSP: admin 是内部系统，限制严格（无第三方脚本）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self'; form-action 'self'; base-uri 'self';" always;

    root /usr/share/nginx/html;
    index index.html;

    # ===== 上传文件大小限制 =====
    # 与 server 端保持一致（server 端通常限制 10M），超出返回 413
    client_max_body_size 10M;

    # 隐藏 nginx 版本号
    server_tokens off;

    # ===== SPA fallback =====
    # 先尝试静态文件 → 目录 → 找不到则回退到 /index.html，由 vue-router 接管客户端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== 静态资源强缓存 =====
    # vite 产物文件名带 hash（如 index-B306FZ7x.css），可以永久缓存 + immutable
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ===== REST API 反代 =====
    # /api/* 转发到 server 服务（NestJS REST 控制器）
    location /api/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ===== GraphQL endpoint 反代（含 WebSocket 支持） =====
    # WebSocket 用于 GraphQL subscriptions（实时数据推送）
    location /graphql {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # 24h 长连接超时（subscriptions 可能长时间不发送数据）
        proxy_read_timeout 86400s;
    }

    # ===== 上传文件反代 =====
    # 用户头像、附件等静态资源
    location /uploads/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
    }

    # ===== 隐藏敏感文件 =====
    # 禁止访问 .git / .env / .htaccess 等隐藏文件（.well-known 例外，给 ACME 证书用）
    location ~ /\.(?!well-known) {
        deny all;
    }

    # ===== 容器健康检查端点 =====
    # 供外部 k8s/docker healthcheck 使用
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
