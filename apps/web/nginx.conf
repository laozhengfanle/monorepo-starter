# apps/web/nginx.conf — C 端（会员端）nginx 配置
#
# 部署位置：容器内 /etc/nginx/conf.d/default.conf
# 监听端口：80
# 反代目标：server:3000（docker network 内通过服务名解析）
#
# 与 apps/admin/nginx.conf 的差异（C 端 vs 内部系统）：
#   1. server_name 改为 web.example.com（生产用真实域名替换，_ 兜底接受任意 Host）
#   2. X-Frame-Options: DENY（C 端严格防 clickjacking，不允许任何 iframe 嵌入）
#   3. CSP 放宽：C 端要嵌统计、客服 SDK、广告等第三方脚本 + 用户上传任意图片
#      - script-src 加 https:
#      - img-src 加 http:
#      - style-src 加 https:
#      - font-src 加 https:
#      - frame-ancestors 'none'（严于 admin 的 'self'）
#   4. 不需要 /uploads/ 反代（C 端没有上传入口，由 server 端 CORS 直传或前端直连）
#
# 跟 admin 共用的能力：
#   - 静态资源服务（vite build 产物） + 1 年强缓存
#   - SPA fallback：所有未匹配路径回退到 /index.html，由 vue-router 接管
#   - /api/ 反代到 server 服务的 REST 端点
#   - /graphql 反代到 server 服务的 GraphQL endpoint（含 WebSocket 支持）
#   - gzip 压缩、真实 IP 还原

# ===== gzip 压缩 =====
# 文本类资源（HTML/CSS/JS/JSON/WASM）走 gzip，> 1KB 才压缩（避免小文件 CPU 浪费）
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/wasm;

# ===== 真实 IP 还原 =====
# 当 nginx 前还有一层反向代理时（云厂商 LB / CDN），通过 X-Forwarded-For 还原客户端真实 IP
# 生产环境必须改为上游代理的具体 IP/网段，不要使用 0.0.0.0/0
real_ip_header X-Forwarded-For;
set_real_ip_from 172.16.0.0/12;

server {
    listen 80;
    listen [::]:80;
    # 生产环境改成真实域名（例如 web.example.com）
    # _ 表示接受任意 Host header（容器内通过 docker run -p 暴露时方便本地测试）
    server_name web.example.com _;

    # ===== 安全头（C 端放宽版） =====
    # X-Frame-Options: DENY — C 端严格防 clickjacking，不允许任何 iframe 嵌入
    #                   （比 admin 的 SAMEORIGIN 还严：admin 只防外站嵌，C 端连自己其他子域都禁）
    add_header X-Frame-Options "DENY" always;
    # X-Content-Type-Options: 禁止 MIME sniffing，强制按 Content-Type 处理
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer-Policy: 跨站请求时只带 origin，不带完整 URL（C 端保护用户隐私）
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # X-XSS-Protection: 启用浏览器 XSS 过滤器
    add_header X-XSS-Protection "1; mode=block" always;
    # CSP: C 端允许第三方脚本（统计/客服/广告 SDK）+ 用户上传任意图片
    #      比 admin 宽松的关键点：
    #        - script-src 'self' 'unsafe-inline' 'unsafe-eval' https:    （admin 无 https:）
    #        - img-src 'self' data: blob: https: http:                    （admin 无 http:）
    #        - style-src 'self' 'unsafe-inline' https:                    （admin 无 https:）
    #        - font-src 'self' data: https:                               （admin 无 https:）
    #        - frame-ancestors 'none'                                     （admin 是 'self'）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https: http:; font-src 'self' data: https:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;

    root /usr/share/nginx/html;
    index index.html;

    # ===== 上传文件大小限制 =====
    # 与 server 端保持一致（server 端通常限制 10M），超出返回 413
    client_max_body_size 10M;

    # 隐藏 nginx 版本号
    server_tokens off;

    # ===== SPA fallback =====
    # 先尝试静态文件 → 目录 → 找不到则回退到 /index.html，由 vue-router 接管客户端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== 静态资源强缓存 =====
    # vite 产物文件名带 hash（如 index-BLsMx14J.css），可以永久缓存 + immutable
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ===== REST API 反代 =====
    # /api/* 转发到 server 服务（NestJS REST 控制器）
    location /api/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ===== GraphQL endpoint 反代（含 WebSocket 支持） =====
    # WebSocket 用于 GraphQL subscriptions（实时数据推送）
    location /graphql {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # 24h 长连接超时（subscriptions 可能长时间不发送数据）
        proxy_read_timeout 86400s;
    }

    # ===== 隐藏敏感文件 =====
    # 禁止访问 .git / .env / .htaccess 等隐藏文件（.well-known 例外，给 ACME 证书用）
    location ~ /\.(?!well-known) {
        deny all;
    }

    # ===== 容器健康检查端点 =====
    # 供外部 k8s/docker healthcheck 使用
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}