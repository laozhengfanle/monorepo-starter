# ============================================
# Docs 工作流
# ============================================
# 触发：
#   1. push 到 main 分支（更新文档）
#   2. 手动 workflow_dispatch（按需重新生成）
#
# 流程：
#   - 生成 TypeDoc（共享包 API 文档）
#   - 生成 OpenAPI（服务端 REST API 文档）
#   - 生成 ER 图（Prisma 数据库关系图）
#   - 部署到 GitHub Pages
#
# 注意事项：
#   - 需要在仓库设置中开启 GitHub Pages（Source: GitHub Actions）
#   - 文档站点地址：https://<owner>.github.io/<repo>/
# ============================================

name: Docs

on:
    push:
        branches: [main]
        paths:
            - 'apps/server/**'
            - 'apps/admin/**'
            - 'apps/web/**'
            - 'packages/shared/**'
            - 'apps/server/prisma/**'
            - '.github/workflows/docs.yml'
    workflow_dispatch:

# 取消同 branch 旧的 run
concurrency:
    group: docs-${{ github.ref }}
    cancel-in-progress: true

# 最小权限 + 写 Pages 权限
permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    # ============================================
    # Job 1: 生成所有文档
    # ============================================
    build-docs:
        name: Build Documentation
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # ==================== TypeDoc ====================
            - name: Generate TypeDoc
              run: |
                  mkdir -p docs-site/api
                  if pnpm list -r typedoc 2>/dev/null | grep -q typedoc; then
                      cd packages/shared
                      pnpm exec typedoc --out ../../docs-site/api --entryPoints src/index.ts --readme none --skipErrorChecking || echo "TypeDoc generation failed"
                      cd ../..
                  else
                      echo "# TypeDoc not installed" > docs-site/api/README.md
                      echo "Run: pnpm add -Dw typedoc typedoc-plugin-markdown" >> docs-site/api/README.md
                  fi

            # ==================== OpenAPI ====================
            - name: Generate OpenAPI
              run: |
                  mkdir -p docs-site
                  echo '{"openapi":"3.0.0","info":{"title":"OpenAPI export script not yet implemented"},"paths":{}}' > docs-site/openapi.json

            # ==================== ER Diagram ====================
            - name: Generate ER Diagram (Mermaid)
              run: |
                  mkdir -p docs-site/er
                  if [ -f apps/server/prisma/schema.prisma ]; then
                      echo "erDiagram" > docs-site/er/schema.mmd
                      echo "" >> docs-site/er/schema.mmd
                      # 从 schema.prisma 提取 model 定义（简化版）
                      awk '
                      /^model / {
                          if (in_model) print "    }"
                          in_model = 1
                          model_name = $2
                          gsub(/\{/, "", model_name)
                          print "    " model_name " {"
                          next
                      }
                      in_model && /^\}/ {
                          print "    }"
                          in_model = 0
                          next
                      }
                      in_model && /^[[:space:]]*\/\// { next }
                      in_model && /^[[:space:]]*\@/ { next }
                      in_model && /^[[:space:]]*[a-zA-Z_]+/ {
                          print "        " $0
                      }
                      ' apps/server/prisma/schema.prisma >> docs-site/er/schema.mmd
                      echo "ER diagram generated"
                  else
                      echo "erDiagram" > docs-site/er/schema.mmd
                  fi

            # ==================== 复制设计文档 ====================
            - name: Copy markdown docs
              run: |
                  mkdir -p docs-site/markdown
                  if [ -d docs ]; then
                      cp -r docs/* docs-site/markdown/ 2>/dev/null || true
                  fi

            # ==================== 生成首页 ====================
            - name: Generate index.html
              run: |
                  cat > docs-site/index.html <<'EOF'
                  <!DOCTYPE html>
                  <html lang="zh-CN">
                  <head>
                      <meta charset="UTF-8">
                      <meta name="viewport" content="width=device-width, initial-scale=1.0">
                      <title>Monorepo Starter - Documentation</title>
                      <style>
                          body {
                              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                              max-width: 800px;
                              margin: 50px auto;
                              padding: 0 20px;
                              line-height: 1.6;
                              color: #333;
                          }
                          h1 { color: #2c3e50; border-bottom: 2px solid #42b883; padding-bottom: 10px; }
                          h2 { color: #34495e; margin-top: 30px; }
                          .card {
                              background: #f8f9fa;
                              border-left: 4px solid #42b883;
                              padding: 15px 20px;
                              margin: 20px 0;
                              border-radius: 4px;
                          }
                          a { color: #42b883; text-decoration: none; }
                          a:hover { text-decoration: underline; }
                          .meta { color: #7f8c8d; font-size: 0.9em; }
                      </style>
                  </head>
                  <body>
                      <h1>📚 Monorepo Starter Documentation</h1>
                      <p class="meta">Enterprise foundation · NestJS + Prisma + GraphQL · Node.js 22 LTS</p>

                      <h2>API 文档</h2>
                      <div class="card">
                          <h3>📦 Shared Package API</h3>
                          <p>共享包 API 文档（TypeDoc 生成的 TypeScript API 参考）</p>
                          <p><a href="./api/index.html">查看 API 文档 →</a></p>
                      </div>
                      <div class="card">
                          <h3>🌐 REST API (OpenAPI)</h3>
                          <p>服务端 REST API 规范（OpenAPI 3.0）</p>
                          <p><a href="./openapi.json">下载 OpenAPI JSON →</a></p>
                      </div>
                      <div class="card">
                          <h3>🗄️ Database ER Diagram</h3>
                          <p>Prisma 数据库关系图（Mermaid 格式）</p>
                          <p><a href="./er/schema.mmd">查看 ER 图 →</a></p>
                      </div>

                      <h2>设计文档</h2>
                      <p>完整的中文设计文档位于 <code>docs/</code> 目录。</p>

                      <h2>CI/CD</h2>
                      <p>查看 GitHub Actions 了解持续集成状态。</p>
                  </body>
                  </html>
                  EOF

            # ==================== 上传 Pages artifact ====================
            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: docs-site

    # ============================================
    # Job 2: 部署到 GitHub Pages
    # ============================================
    deploy:
        name: Deploy to GitHub Pages
        runs-on: ubuntu-latest
        needs: build-docs
        timeout-minutes: 10
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
