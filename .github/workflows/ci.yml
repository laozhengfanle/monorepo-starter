name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# 取消同 branch 旧的 run
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

# 最小权限原则
permissions:
    contents: read

# ============================================
# CI 矩阵：当前仅 node 22 / pnpm 11
# 如需多版本验证，取消下方 strategy 的注释
# ============================================
env:
    NODE_VERSION: '22'
    PNPM_VERSION: '11'

jobs:
    # ============================================
    # Job 1: install → lint → typecheck → test → build（fast feedback）
    # ============================================
    lint-test-build:
        name: Lint + Typecheck + Test + Build
        runs-on: ubuntu-latest
        timeout-minutes: 20

        # 多版本验证矩阵（默认只跑 22.x；如需矩阵验证可改：
        # matrix:
        #   node-version: [20.x, 22.x]
        #   pnpm-version: [10, 11]
        # ）
        strategy:
            fail-fast: false
            matrix:
                node-version: ['22.x']

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm ${{ env.PNPM_VERSION }}
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            # 显式缓存 pnpm store 路径（与 setup-node 的 cache: pnpm 互补）
            - name: Cache pnpm store
              uses: actions/cache@v4
              with:
                  path: ~/.local/share/pnpm/store
                  key: ${{ runner.os }}-pnpm-store-${{ env.PNPM_VERSION }}-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-${{ env.PNPM_VERSION }}-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm -r lint

            - name: Typecheck
              run: pnpm -r typecheck

            - name: Security audit
              run: pnpm audit --audit-level=high

            - name: Test (server)
              run: pnpm -F @apps/server test -- --run

            - name: Test (admin)
              run: pnpm -F @apps/admin test -- --run

            - name: Test (web)
              run: pnpm -F @apps/web test -- --run

            - name: Build (all)
              run: pnpm -r build

  # ============================================
  # Job 2: build Docker images + Trivy scan
  # ============================================
  build-and-scan:
    name: Build Docker + Trivy Scan
    runs-on: ubuntu-latest
    needs: lint-test-build
    timeout-minutes: 25

    permissions:
      contents: read
      security-events: write  # 上传 SARIF 需要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: false
          tags: server:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build admin image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: false
          tags: admin:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: web:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (server)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: server:ci-${{ github.sha }}
          format: sarif
          output: trivy-server.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Trivy scan (admin)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: admin:ci-${{ github.sha }}
          format: sarif
          output: trivy-admin.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Trivy scan (web)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: web:ci-${{ github.sha }}
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-server.sarif

      - name: Upload Trivy results (admin)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-admin.sarif

      - name: Upload Trivy results (web)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web.sarif
