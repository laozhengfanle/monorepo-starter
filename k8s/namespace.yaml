# Namespace：MonoKit 部署目标命名空间
# 所有 MonoKit 相关资源（postgres / redis / server / admin / web）都部署在 monorepo namespace 下
# 隔离业务资源，避免与其他 K8s 工作负载冲突
apiVersion: v1
kind: Namespace
metadata:
    name: monorepo
    labels:
        # 标记为 MonoKit 业务域，便于 kubectrl -n 过滤 / 网络策略分组
        app.kubernetes.io/part-of: monorepo
        # 符合 K8s 推荐的标签规范
        app.kubernetes.io/name: monorepo
        app.kubernetes.io/managed-by: kubectl
