# Admin Deployment（管理后台）
# - 静态 SPA：Nginx 服务构建好的 dist/ 静态文件
# - 1 replica 即可（SPA 是无状态 + 只读 + 由 CDN/浏览器缓存分担压力）
# - 镜像 tag 留 placeholder
apiVersion: apps/v1
kind: Deployment
metadata:
    name: admin
    namespace: monorepo
    labels:
        app: admin
spec:
    replicas: 1
    selector:
        matchLabels:
            app: admin
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    template:
        metadata:
            labels:
                app: admin
        spec:
            securityContext:
                runAsNonRoot: true
                runAsUser: 101 # nginx-alpine 内置 nginx 用户
                runAsGroup: 101
                fsGroup: 101
                readOnlyRootFilesystem: true
            containers:
                - name: admin
                  # 占位：替换为实际镜像仓库 + tag
                  image: <registry>/monorepo-admin:<tag>
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 80
                        name: http
                  resources:
                      requests:
                          memory: 64Mi
                          cpu: 50m
                      limits:
                          memory: 128Mi
                          cpu: 200m
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 80
                      initialDelaySeconds: 10
                      periodSeconds: 30
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 80
                      initialDelaySeconds: 5
                      periodSeconds: 10
                      timeoutSeconds: 3
                      failureThreshold: 3
            terminationGracePeriodSeconds: 30
