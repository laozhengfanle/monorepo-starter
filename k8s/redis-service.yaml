# Redis Service
# - ClusterIP 类型：仅 K8s 集群内部访问
# - 端口 6379（Redis 默认端口）
apiVersion: v1
kind: Service
metadata:
    name: redis-service
    namespace: monorepo
    labels:
        app: redis
spec:
    type: ClusterIP
    ports:
        - port: 6379
          targetPort: 6379
          protocol: TCP
          name: redis
    selector:
        app: redis
