# Server Service
# - ClusterIP 类型：仅 K8s 集群内部访问
# - Ingress 把外部流量转到这里，再到 Pod
apiVersion: v1
kind: Service
metadata:
    name: server-service
    namespace: monorepo
    labels:
        app: server
spec:
    type: ClusterIP
    ports:
        - port: 80
          targetPort: 3000
          protocol: TCP
          name: http
    selector:
        app: server
