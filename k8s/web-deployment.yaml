# Web Deployment（C 端）
apiVersion: apps/v1
kind: Deployment
metadata:
    name: web
    namespace: monorepo
    labels:
        app: web
spec:
    replicas: 1
    selector:
        matchLabels:
            app: web
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    template:
        metadata:
            labels:
                app: web
        spec:
            securityContext:
                runAsNonRoot: true
                runAsUser: 101
                runAsGroup: 101
                fsGroup: 101
                readOnlyRootFilesystem: true
            containers:
                - name: web
                  image: <registry>/monorepo-web:<tag>
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 80
                        name: http
                  resources:
                      requests:
                          memory: 64Mi
                          cpu: 50m
                      limits:
                          memory: 128Mi
                          cpu: 200m
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 80
                      initialDelaySeconds: 10
                      periodSeconds: 30
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 80
                      initialDelaySeconds: 5
                      periodSeconds: 10
                      timeoutSeconds: 3
                      failureThreshold: 3
            terminationGracePeriodSeconds: 30
